<!DOCTYPE html>
<html lang="ja">
  
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FILM LOG</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;500&family=DM+Mono:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --card: #161616;
    --border: #242424;
    --gold: #c9a84c;
    --gold-dim: #8a6f30;
    --text: #e8e8e8;
    --text-muted: #666;
    --text-dim: #999;
    --red: #e03030;
    --overlay: rgba(10,10,10,0.92);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── GRAIN OVERLAY ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  /* ── HEADER ── */
  header {
    position: relative;
    padding: 80px 60px 60px;
    border-bottom: 1px solid var(--border);
    overflow: hidden;
    background-image: url('Emily_header_image.jpg');
    background-size: cover;
    background-position: center;
    
  }

  header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .header-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(72px, 12vw, 160px);
    line-height: 0.85;
    letter-spacing: 0.04em;
    color: var(--text);
    position: relative;
  }

  h2{
    font-family: 'Bebas Neue', sans-serif;
  }

  .header-eng{
    font-family: "Playfair", serif;
    margin-top:15px;
  }

  .header-come{
     font-family: "Playfair", serif;
  }

  h1 span {
    color: var(--gold);
  }

  .header-meta {
    margin-top: 24px;
    display: flex;
    align-items: center;
    gap: 32px;
  }

  .film-count {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text-muted);
  }

  .film-count strong {
    color: var(--text-dim);
    font-style: italic;
  }

  /* ── AFFILIATE ── */
  .between{
    margin-top:25px;
  }

  .spring img{
    height: 262px;

  }

  .kindle img{
    height: 262px;
  }

  .videomusic img{
    height:70px;
  }

  /* ── CONTROLS ── */
  .controls {
    border-bottom: 1px solid var(--border);
  }

  .controls-row {
    padding: 20px 60px;
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
  }

  .controls-row + .controls-row {
    padding-top: 0;
    padding-bottom: 20px;
    border-top: 1px solid var(--border);
  }

  .filter-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
    max-width: 360px;
  }

  .search-wrap svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
  }

  input[type="text"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    padding: 10px 14px 10px 40px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus {
    border-color: var(--gold-dim);
  }

  input[type="text"]::placeholder { color: var(--text-muted); }

  .filter-chips {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .chip {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 7px 14px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .chip:hover { border-color: var(--gold-dim); color: var(--gold); }
  .chip.active { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.07); }

  /* Year chips — slightly different accent */
  .chip-year.active {
    border-color: #7eb8d4;
    color: #7eb8d4;
    background: rgba(126,184,212,0.07);
  }
  .chip-year:hover { border-color: #5a9ab8; color: #7eb8d4; }

  /* Year badge on poster */
  .year-badge {
    position: absolute;
    top: 10px;
    right: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.06em;
    padding: 3px 7px;
    background: rgba(0,0,0,0.75);
    border: 1px solid rgba(126,184,212,0.4);
    color: #7eb8d4;
    backdrop-filter: blur(4px);
    pointer-events: none;
  }

  .view-toggle {
    margin-left: auto;
    display: flex;
    gap: 4px;
  }

  .view-btn {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
  }

  .view-btn.active { border-color: var(--gold); color: var(--gold); }

  /* ── GRID ── */
  .grid-container {
    padding: 48px 60px 80px;
  }

  #movie-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 2px;
    transition: all 0.3s;
  }

  #movie-grid.list-view {
    grid-template-columns: 1fr;
    gap: 1px;
  }

  /* ── MOVIE CARD ── */
  .movie-card {
    position: relative;
    background: var(--card);
    overflow: hidden;
    cursor: pointer;
    animation: fadeUp 0.5s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-poster {
    position: relative;
    aspect-ratio: 2/3;
    overflow: hidden;
    background: var(--surface);
  }

  #movie-grid.list-view .card-poster {
    aspect-ratio: unset;
    height: 120px;
    width: 80px;
    flex-shrink: 0;
  }

  .card-poster img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.6s cubic-bezier(0.25,0.46,0.45,0.94), filter 0.4s;
    filter: brightness(0.9) saturate(0.85);
  }

  .movie-card:hover .card-poster img {
    transform: scale(1.06);
    filter: brightness(1) saturate(1);
  }

  .poster-fallback {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
    color: var(--text-muted);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    letter-spacing: 0.1em;
    background: linear-gradient(135deg, #141414, #1a1a1a);
  }

  .poster-fallback svg { opacity: 0.3; }

  /* Hover overlay */
  .card-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.2) 50%, transparent 100%);
    opacity: 0;
    transition: opacity 0.35s;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 20px 16px 16px;
    gap: 10px;
  }

  .movie-card:hover .card-overlay { opacity: 1; }

  .overlay-comment {
    font-size: 12px;
    color: rgba(232,232,232,0.85);
    line-height: 1.5;
    font-style: italic;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .overlay-links {
    display: flex;
    gap: 8px;
  }

  .btn-link {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    padding: 6px 10px;
    border: 1px solid;
    text-decoration: none;
    text-transform: uppercase;
    transition: all 0.2s;
    backdrop-filter: blur(4px);
  }

  .btn-amazon {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(201,168,76,0.1);
  }

  .btn-amazon:hover { background: rgba(201,168,76,0.25); }

  .btn-imdb {
    border-color: #555;
    color: #999;
    background: rgba(255,255,255,0.05);
  }

  .btn-imdb:hover { border-color: #888; color: #ccc; }

  /* Card info (always visible) */
  .card-info {
    padding: 14px 14px 16px;
    border-top: 1px solid var(--border);
  }

  .card-title {
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 500;
    font-size: 14px;
    line-height: 1.3;
    color: var(--text);
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-genre {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--gold-dim);
    text-transform: uppercase;
  }

  /* LIST VIEW */
  #movie-grid.list-view .movie-card {
    display: flex;
    align-items: stretch;
  }

  #movie-grid.list-view .card-poster {
    aspect-ratio: unset !important;
    width: 90px;
    height: 135px;
    flex-shrink: 0;
  }

  #movie-grid.list-view .card-overlay { display: none; }

  #movie-grid.list-view .card-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    border-top: none;
    border-left: 1px solid var(--border);
    padding: 16px 20px;
    gap: 6px;
  }

  #movie-grid.list-view .card-title {
    white-space: normal;
    font-size: 15px;
  }

  #movie-grid.list-view .list-comment {
    font-size: 12px;
    color: var(--text-muted);
    font-style: italic;
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-top: 2px;
  }

  #movie-grid.list-view .list-links {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }

  /* ── LOADING / EMPTY / ERROR ── */
  .state-msg {
    grid-column: 1 / -1;
    text-align: center;
    padding: 80px 20px;
    color: var(--text-muted);
  }

  .state-msg .icon {
    font-size: 48px;
    margin-bottom: 16px;
    filter: grayscale(1) opacity(0.4);
  }

  .state-msg p {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.1em;
  }

  .loader {
    display: inline-block;
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── SCANLINE ── */
  .scanline {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent 0%, var(--gold) 50%, transparent 100%);
    opacity: 0.15;
    pointer-events: none;
    z-index: 999;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    header { padding: 48px 24px 40px; }
    .controls { padding: 20px 24px; }
    .grid-container { padding: 32px 24px 60px; }
    #movie-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }

      .between{
      display: block;
      text-align: center;
    }
    .spring img{ width:100%;
    
    }
    .kindle img{ height: 50px; }
    .videomusic img{ height:30px; }

  }

  @media (max-width: 480px) {
    #movie-grid { grid-template-columns: repeat(2, 1fr); }
    .between{
      display: block;
      text-align: center;
    }
      
    .spring img{ width:100%;
    
    }
    .kindle img{ height: 80px; }
    .videomusic img{ height:30px; }

  }

  /* ── FOOTER ── */
  footer {
    border-top: 1px solid var(--border);
    padding: 24px 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }

  footer p {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    color: seashell;
  }

  .copyright p{
    color: seashell;
  }

  #last-updated { color: var(--gold-dim); }
</style>
</head>
<body>

<div class="scanline"></div>

<header>
  <div class="header-label">Personal Cinema Archive</div>
  <h1>FILM<br><span>LOG</span></h1>
  <h2>by Camille</h2>
  <h3 class="header-eng">A personal page where I keep track of the movies, TV shows, and anime I've watched.</h3>
  <h4 class="header-come">自分が観た映画・ドラマ・アニメを記録していく個人ページです。</h4>
  <div class="header-meta">
    <span class="film-count">
      <strong id="count-display">—</strong>&nbsp;films watched
    </span>
  </div>
  
</header>

<div class="between">
      <a href="https://amzn.to/4teQwSq" class="videomusic"><img src="primevideo.jpg" alt="amazonprimevideo"></a>
      <a href="https://amzn.to/41x4qUb" class="videomusic"><img src="music.jpg" alt="amazonmusic"></a>
    </div>


<div class="controls">
  <!-- Row 1: Search + Year filter + View toggle -->
  <div class="controls-row">
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="search-input" placeholder="タイトル・ジャンルで検索…">
    </div>
    <span class="filter-label">Year</span>
    <div class="filter-chips" id="year-filters">
      <button class="chip chip-year active" data-year="ALL" onclick="filterYear(this,'ALL')">ALL</button>
    </div>


    <div class="view-toggle">
      <button class="view-btn active" id="btn-grid" title="グリッド表示" onclick="setView('grid')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
        </svg>
      </button>
      <button class="view-btn" id="btn-list" title="リスト表示" onclick="setView('list')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <rect x="3" y="4" width="18" height="3"/><rect x="3" y="10.5" width="18" height="3"/><rect x="3" y="17" width="18" height="3"/>
        </svg>
      </button>
    </div>
  </div>


  <!-- Row 2: Genre filter -->
  <div class="controls-row">
    <span class="filter-label">Genre</span>
    <div class="filter-chips" id="genre-filters">
      <button class="chip active" data-genre="ALL">ALL</button>
    </div>
  </div>
</div>

<div class="grid-container">
  <div id="movie-grid">
    <div class="state-msg">
      <div class="loader"></div>
      <p>LOADING FILMS…</p>
    </div>
  </div>
</div>


<footer>
  <div>
  <p>FILM LOG &mdash; Personal Cinema Archive</p>
  <p id="last-updated"></p>
  </div>
  <div class="copyright"><p>©︎Camille</p></div>
</footer>
<div class="between">
  <a href="https://amzn.to/4cdBTZS" class="spring"><img src="amazonspringsale.jpg" alt="amazon"></a>
  <a href="https://amzn.to/47ttgYH" class="kindle"><img src="amazonkindlesale.jpg" alt="amazon"></a>
  <a href="https://amzn.to/4tab1zF" class="kindle"><img src="kindle2.jpg" alt="amazon"></a>
</div>

<script>
// ════════════════════════════════════════════════
//  CONFIGURATION — ここを編集してください
// ════════════════════════════════════════════════
const CONFIG = {
  // Google Sheets の公開URL（CSV形式）
  
  SHEET_URL: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTgr46uJvqXXNB89buYBaK6DJTtSZ6rA1lHM0e3d5RFAfdrE43WBN3-korhiBEewx9urYSZ6mwtCkSL/pub?output=csv',

  // スプレッドシートのカラム順（0始まり）
  // A=タイトル, B=視聴年, C=ジャンル, D=コメント, E=ポスターURL, F=AmazonリンクURL, G=IMDbリンクURL
  COLS: {
    title:        0,  // A列
    watched_year: 1,  // B列 ← 新規追加
    genre:        2,  // C列
    comment:      3,  // D列
    poster:       4,  // E列
    amazon:       5,  // F列
    imdb:         6,  // G列
  }
};

// ════════════════════════════════════════════════
let allMovies = [];
let currentYear  = 'ALL';
let currentGenre = 'ALL';
let currentView  = 'grid';

// CSV パーサー（ダブルクォートに対応）
function parseCSV(text) {
  const lines = text.trim().split('\n');
  return lines.slice(1).map(line => {
    const cells = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"' && !inQ) { inQ = true; continue; }
      if (c === '"' && inQ && line[i+1] === '"') { cur += '"'; i++; continue; }
      if (c === '"' && inQ) { inQ = false; continue; }
      if (c === ',' && !inQ) { cells.push(cur.trim()); cur = ''; continue; }
      cur += c;
    }
    cells.push(cur.trim());
    return cells;
  }).filter(r => r.some(c => c));
}

function getCell(row, key) {
  const idx = CONFIG.COLS[key];
  return (idx !== undefined && idx < row.length) ? row[idx] : '';
}

async function fetchMovies() {
  const grid = document.getElementById('movie-grid');
  try {
    const res = await fetch(CONFIG.SHEET_URL);
    if (!res.ok) throw new Error('Network error');
    const text = await res.text();
    const rows = parseCSV(text);

    allMovies = rows.map(r => ({
      title:        getCell(r, 'title'),
      watched_year: getCell(r, 'watched_year'),
      genre:        getCell(r, 'genre'),
      comment:      getCell(r, 'comment'),
      poster:       getCell(r, 'poster'),
      amazon:       getCell(r, 'amazon'),
      imdb:         getCell(r, 'imdb'),
    })).filter(m => m.title);

    buildYearFilters();
    buildGenreFilters();
    renderMovies();
    updateCount();

    const ts = new Date().toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric' });
    document.getElementById('last-updated').textContent = `Updated: ${ts}`;

  } catch (e) {
    grid.innerHTML = `
      <div class="state-msg">
        <div class="icon">⚠</div>
        <p>データの取得に失敗しました</p>
        <p style="margin-top:8px;font-size:11px;color:#444">CONFIG.SHEET_URL を確認してください</p>
      </div>`;
    console.error(e);
  }
}

function buildYearFilters() {
  const years = [...new Set(allMovies.map(m => m.watched_year).filter(Boolean))].sort((a,b) => b - a);
  const wrap = document.getElementById('year-filters');
  wrap.innerHTML = `<button class="chip chip-year active" data-year="ALL" onclick="filterYear(this,'ALL')">ALL</button>`;
  years.forEach(y => {
    const b = document.createElement('button');
    b.className = 'chip chip-year';
    b.dataset.year = y;
    b.textContent = y;
    b.onclick = () => filterYear(b, y);
    wrap.appendChild(b);
  });
}

function buildGenreFilters() {
  const genres = [...new Set(allMovies.map(m => m.genre).filter(Boolean))].sort();
  const wrap = document.getElementById('genre-filters');
  wrap.innerHTML = `<button class="chip active" data-genre="ALL" onclick="filterGenre(this,'ALL')">ALL</button>`;
  genres.forEach(g => {
    const b = document.createElement('button');
    b.className = 'chip';
    b.dataset.genre = g;
    b.textContent = g.toUpperCase();
    b.onclick = () => filterGenre(b, g);
    wrap.appendChild(b);
  });
}

function filterYear(btn, year) {
  currentYear = year;
  document.querySelectorAll('.chip-year').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  renderMovies();
}

function filterGenre(btn, genre) {
  currentGenre = genre;
  document.querySelectorAll('#genre-filters .chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  renderMovies();
}

function getFiltered() {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  return allMovies.filter(m => {
    const matchYear  = currentYear  === 'ALL' || m.watched_year === currentYear;
    const matchGenre = currentGenre === 'ALL' || m.genre === currentGenre;
    const matchSearch = !q || m.title.toLowerCase().includes(q) || m.genre.toLowerCase().includes(q);
    return matchYear && matchGenre && matchSearch;
  });
}

function renderMovies() {
  const grid = document.getElementById('movie-grid');
  const movies = getFiltered();

  if (!movies.length) {
    grid.innerHTML = `<div class="state-msg"><div class="icon">🎬</div><p>NO FILMS FOUND</p></div>`;
    updateCount(0);
    return;
  }

  grid.innerHTML = movies.map((m, i) => {
    const delay = Math.min(i * 40, 400);
    const posterHTML = m.poster
      ? `<img src="${m.poster}" alt="${m.title}" loading="lazy" onerror="this.parentElement.innerHTML=fallbackPoster('${escHtml(m.title)}')">`
      : fallbackPoster(m.title);

    const yearBadge = m.watched_year
      ? `<div class="year-badge">${escHtml(m.watched_year)}</div>` : '';

    const amazonBtn = m.amazon
      ? `<a href="${m.amazon}" target="_blank" rel="noopener" class="btn-link btn-amazon" onclick="event.stopPropagation()">
           Amazon
         </a>`
      : '';
    const imdbBtn = m.imdb
      ? `<a href="${m.imdb}" target="_blank" rel="noopener" class="btn-link btn-imdb" onclick="event.stopPropagation()">
           IMDb
         </a>`
      : '';

    const isListView = currentView === 'list';
    const listComment = isListView && m.comment
      ? `<div class="list-comment">${escHtml(m.comment)}</div>` : '';
    const listLinks = isListView
      ? `<div class="list-links">${amazonBtn}${imdbBtn}</div>` : '';

    return `
    <div class="movie-card" style="animation-delay:${delay}ms">
      <div class="card-poster">
        ${posterHTML}
        ${yearBadge}
        <div class="card-overlay">
          ${m.comment ? `<div class="overlay-comment">${escHtml(m.comment)}</div>` : ''}
          <div class="overlay-links">${amazonBtn}${imdbBtn}</div>
        </div>
      </div>
      <div class="card-info">
        <div class="card-title">${escHtml(m.title)}</div>
        ${m.genre ? `<div class="card-genre">${escHtml(m.genre)}${m.watched_year ? `<span style="color:var(--text-muted);margin-left:8px;font-size:9px">${escHtml(m.watched_year)}</span>` : ''}</div>` : (m.watched_year ? `<div class="card-genre" style="color:var(--text-muted)">${escHtml(m.watched_year)}</div>` : '')}
        ${listComment}
        ${listLinks}
      </div>
    </div>`;
  }).join('');

  updateCount(movies.length);
}

function fallbackPoster(title) {
  const initial = title ? title.charAt(0).toUpperCase() : '?';
  return `<div class="poster-fallback">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <rect x="2" y="2" width="20" height="20" rx="2"/>
      <path d="M7 8h10M7 12h6"/>
    </svg>
    <span>${escHtml(initial)}</span>
  </div>`;
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function setView(v) {
  currentView = v;
  const grid = document.getElementById('movie-grid');
  grid.classList.toggle('list-view', v === 'list');
  document.getElementById('btn-grid').classList.toggle('active', v === 'grid');
  document.getElementById('btn-list').classList.toggle('active', v === 'list');
  renderMovies();
}

function updateCount(n) {
  const el = document.getElementById('count-display');
  el.textContent = n !== undefined ? n : allMovies.length;
}

// Search
document.getElementById('search-input').addEventListener('input', renderMovies);

// Init
fetchMovies();
</script>
</body>
</html>
